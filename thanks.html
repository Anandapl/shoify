<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }
  .fa-gift{
    margin-right: 10px;
  }

  .thankyou-container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .thankyou-container h1 {
    color: #333;
    margin-bottom: 10px;
  }

  .thankyou-container p {
    color: #666;
    margin-bottom: 20px;
  }

  .btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .btn:hover {
    opacity: 0.9;
  }

</style>
</head>
<body>
<section class="form">

<div class="thankyou-container">
  <h1><i class="fa-solid fa-gift"></i>Thank You!</h1>
  <p>Your form has been submitted successfully.</p>

  <a href="index.html" class="btn">Go Back</a>
</div>
</section>

</body>
</html>
