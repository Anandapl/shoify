<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .form{
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: #fff;
            padding: 20px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 12px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 10px;
            flex: 1;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 3px;
            display: block;
            color: #555;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 8px;
            /* reduced */
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 60px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .error{
            color:red;font-size:12px
        }
    </style>
</head>
<body>
<section class="form">

    <div class="form-container">
        <h2>Register</h2>

        <form onsubmit="validateForm(event)">

            <div class="row">
                <div class="input-group">
                    <label>Name</label>
                    <input id="name" type="text">
                    <span id="nameError" class="error" ></span>
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input id="num" type="tel">
                    <span id="numError" class="error" ></span>
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input id="email" type="email">
                <span id="emailError" class="error" ></span>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Password</label>
                    <input id="password" class="error" type="password">
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea></textarea>
            </div>

            <button class="btn" type="submit">Submit</button>

        </form>
    </div>
    </section>

    <script>
        function validateForm(e) {
            e.preventDefault()
            var name = document.getElementById("name").value
            var num = document.getElementById("num").value
            var email = document.getElementById("email").value
            var password = document.getElementById("password").value

            document.getElementById("nameError").innerHTML = ""
            document.getElementById("numError").innerHTML = ""
            document.getElementById("emailError").innerHTML = ""

            name = name.trim()
            num = num.trim()
            email = email.trim()

            if (name === "") {
                nameError.innerHTML = "Name is Required"
                return
            }
            if (email === "") {
                emailError.innerHTML = "Email is Required"
                return
            }
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.innerHTML = "Invalid Email"
                return
            }
            if (num === "") {
                numError.innerHTML = "Num is Required"
                return
            }
            else if (!/^\d+$/.test(num)) {
                numError.innerHTML = "Invalid Number"
                return

            }

            window.location.href = "thanks.html"
        }
    </script>

</body>

</html>
