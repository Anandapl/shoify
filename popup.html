<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Popup Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f4f4;
  }

  /* Open Button */
  .open-btn {
    padding: 12px 20px;
    border: none;
    background: #667eea;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
  }

  /* Popup Overlay */
  .popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);

    display: flex; /* YOU WILL CHANGE THIS USING JS */

    justify-content: center;
    align-items: center;
  }

  /* Login Box */
  .form-container {
    background: #fff;
    padding: 25px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    position: relative;
  }

  .form-container h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .input-group {
    margin-bottom: 15px;
  }

  .input-group label {
    font-size: 13px;
    margin-bottom: 5px;
    display: block;
    color: #555;
  }

  .input-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
  }

  .btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  /* Close Button */
  .close-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    font-size: 18px;
  }

  .error {
    color: red;
    font-size: 12px;
  }

</style>
</head>

<body>

<button class="open-btn">Open Login</button>

<div class="popup">

  <div class="form-container">
    
    <span class="close-btn">&times;</span>

    <h2>Login</h2>

    <form>

      <div class="input-group">
        <label>Email</label>
        <input id="email" type="email">
        <span class="error" id="emailError"></span>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input id="password" type="password">
        <span class="error" id="passwordError"></span>
      </div>

      <button class="btn" type="submit">Login</button>

    </form>

  </div>

</div>

</body>
</html>
